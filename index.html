<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World Animation</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --accent1: #22d3ee;
      --accent2: #a78bfa;
      --text: #f8fafc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(34, 211, 238, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(167, 139, 250, 0.22), transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    .glow {
      position: absolute;
      width: 38vw;
      height: 38vw;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.22;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      animation: pulse 4.5s ease-in-out infinite;
    }

    .hello {
      position: absolute;
      bottom: -120px;
      left: 50%;
      transform: translateX(-50%) scale(0.85);
      color: var(--text);
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      padding: 0.6em 1em;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      box-shadow:
        0 0 30px rgba(34, 211, 238, 0.18),
        0 0 60px rgba(167, 139, 250, 0.14),
        inset 0 0 18px rgba(255, 255, 255, 0.08);
      text-shadow:
        0 0 10px rgba(255, 255, 255, 0.3),
        0 0 20px rgba(34, 211, 238, 0.4),
        0 0 36px rgba(167, 139, 250, 0.35);
      animation: floatToCenter 2.8s cubic-bezier(0.22, 1, 0.36, 1) forwards,
                 shimmer 3s ease-in-out 2.8s infinite alternate;
    }

    .subtitle {
      position: absolute;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(248, 250, 252, 0.7);
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 1.1s ease 2.2s forwards;
    }

    @keyframes floatToCenter {
      0% {
        bottom: -120px;
        opacity: 0;
        transform: translateX(-50%) scale(0.7);
      }
      30% {
        opacity: 1;
      }
      100% {
        bottom: 50%;
        transform: translate(-50%, 50%) scale(1);
        opacity: 1;
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(0.95);
        opacity: 0.18;
      }
      50% {
        transform: scale(1.12);
        opacity: 0.28;
      }
    }

    @keyframes shimmer {
      from {
        box-shadow:
          0 0 30px rgba(34, 211, 238, 0.18),
          0 0 60px rgba(167, 139, 250, 0.14),
          inset 0 0 18px rgba(255, 255, 255, 0.08);
      }
      to {
        box-shadow:
          0 0 40px rgba(34, 211, 238, 0.28),
          0 0 80px rgba(167, 139, 250, 0.22),
          inset 0 0 24px rgba(255, 255, 255, 0.12);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="hello">Hello World</div>
  <div class="subtitle">Docker Landing Page</div>
</body>
</html>
